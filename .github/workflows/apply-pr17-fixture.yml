name: Apply PR17 fixture fix

on:
  push:
    branches:
      - fix/openrouter-forced-plan-tool

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'chore: activate PR17 fixture patch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/openrouter-forced-plan-tool

      - name: Replace stale public-planner response fixture
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/planning/test_openrouter.py")
          text = path.read_text()
          old = '            return StreamContext(response_for(envelope(json_candidate())))'
          replacement = "\n".join([
              '            tool_arguments = json.dumps({"plan": candidate()}, separators=(",", ":"))',
              '            return StreamContext(',
              '                response_for(',
              '                    {',
              '                        "choices": [',
              '                            {',
              '                                "finish_reason": "tool_calls",',
              '                                "message": {',
              '                                    "content": None,',
              '                                    "tool_calls": [',
              '                                        {',
              '                                            "id": "call_test",',
              '                                            "type": "function",',
              '                                            "function": {',
              '                                                "name": "submit_circuit_plan",',
              '                                                "arguments": tool_arguments,',
              '                                            },',
              '                                        }',
              '                                    ],',
              '                                },',
              '                            }',
              '                        ]',
              '                    }',
              '                )',
              '            )',
          ])
          if text.count(old) != 1:
              raise SystemExit("stale fixture replacement did not match exactly once")
          path.write_text(text.replace(old, replacement))
          compile(path.read_text(), str(path), "exec")
          PY

      - name: Commit exact fixture update and remove this workflow
        shell: bash
        run: |
          rm .github/workflows/apply-pr17-fixture.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add tests/planning/test_openrouter.py .github/workflows/apply-pr17-fixture.yml
          git commit -m "test: align public planner transport fixture"
          git push origin HEAD:fix/openrouter-forced-plan-tool
