name: Pytest Diagnostic

on:
  push:
    branches:
      - fix/openrouter-structured-plan-output
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.11.21"

      - name: Install locked dependencies
        run: uv sync --extra dev --frozen

      - name: Capture pytest output
        run: uv run pytest -q > pytest-output.txt 2>&1 || true

      - name: Upload pytest output
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: error
