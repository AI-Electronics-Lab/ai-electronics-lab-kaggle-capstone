name: Diagnose PR17

on:
  push:
    branches:
      - fix/openrouter-forced-plan-tool

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --disable-pip-version-check "uv==0.11.21"

      - run: uv sync --extra dev --frozen

      - name: Capture complete pytest output
        shell: bash
        run: |
          set +e
          uv run pytest -q > pytest-output.txt 2>&1
          status=$?
          printf '%s\n' "$status" > pytest-status.txt
          cat pytest-output.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: pr17-pytest-diagnostic
          path: |
            pytest-output.txt
            pytest-status.txt
          if-no-files-found: error
