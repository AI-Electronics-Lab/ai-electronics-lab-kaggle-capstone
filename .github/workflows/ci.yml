name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.11.21"

      - name: Install locked dependencies
        run: uv sync --extra dev --frozen

      - name: Check lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q
